const fCRC = (n) => `₡${Math.round(n).toLocaleString('es-CR')}`;
const fShort = (n) => n >= 1000000 ? `₡${(n/1000000).toFixed(1)}M` : n >= 1000 ? `₡${(n/1000).toFixed(0)}k` : `₡${n}`;
const fPct = (n) => `${n>=0?'+':''}${n.toFixed(1)}%`;

const calcMetrics = (data) => {
  const totalGastos = data.gastos.reduce((s,g)=>s+g.monto,0);
  const totalIngresos = data.ingresos.reduce((s,i)=>s+i.monto,0);
  const mesesEjecutados = data.meses_disponibles.length;
  const promedioMensual = totalGastos / mesesEjecutados;
  const proyeccionAnual = promedioMensual * 12;
  const superavit = totalIngresos - totalGastos;
  const totalMorosidad = data.morosos.reduce((s,m)=>s+m.monto,0);
  const cuotaPotencial = data.unidades * data.cuota;
  const intereses = data.ingresos.filter(i=>i.concepto.includes('Intereses')).reduce((s,i)=>s+i.monto,0);
  const tasaCobro = (totalIngresos - intereses) / (cuotaPotencial * mesesEjecutados);
  const mesesCobertura = data.fondo_reserva_actual / promedioMensual;
  const porCategoria = {};
  Object.keys(CATEGORY_LABELS).forEach(cat => { porCategoria[cat] = data.gastos.filter(g=>g.categoria===cat).reduce((s,g)=>s+g.monto,0); });
  const porMes = data.meses_disponibles.map(mes => ({
    mes,
    gastos: data.gastos.filter(g=>g.mes===mes).reduce((s,g)=>s+g.monto,0),
    ingresos: data.ingresos.filter(i=>i.mes===mes).reduce((s,i)=>s+i.monto,0),
  }));
  return { totalGastos,totalIngresos,mesesEjecutados,promedioMensual,proyeccionAnual,superavit,totalMorosidad,tasaCobro,mesesCobertura,porCategoria,porMes };
};

const getSalud = (data,m) => {
  const tieneRoja = data.alertas.some(a=>a.tipo==='roja');
  const fondoCorto = m.mesesCobertura < 3;
  const ej = m.proyeccionAnual / data.presupuesto_anual_gastos;
  if(tieneRoja||fondoCorto||ej>1.05) return {nivel:'rojo',label:'Atención requerida',color:C.red,icon:'⚠️'};
  if(ej>0.95||data.alertas.some(a=>a.tipo==='amarilla')) return {nivel:'amarillo',label:'Bajo vigilancia',color:C.yellow,icon:'📊'};
  return {nivel:'verde',label:'Saludable',color:C.green,icon:'✓'};
};

const TabGastos = ({data,metrics}) => {
  const top10 = [...data.gastos].sort((a,b)=>b.monto-a.monto).slice(0,10);

    const ej = metrics.porCategoria[cat];
    const pres = (data.presupuestos[cat]/12)*metrics.mesesEjecutados;
    const pct = pres>0?(ej/pres)*100:0;
    let estado='verde'; if(pct>100) estado='rojo'; else if(pct>85) estado='amarillo';
    return {cat,label:CATEGORY_LABELS[cat],ej,pres,pct,estado};

        <Card padding="p-6">
          <div className="space-y-3">
            {top10.map((g,i)=>{
              const pct=(g.monto/maxM)*100;
              const medal=i===0?C.gold:i===1?'#94a3b8':i===2?'#cd7f32':null;
              return (
                <div key={g.id} className="flex items-center gap-3">
                  <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0" style={{background:medal||'#f1f5f9',color:medal?'white':C.mute}}>{i+1}</div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-baseline justify-between gap-2 mb-1">
                      <div className="text-sm font-medium truncate" style={{color:C.ink,fontFamily:'Geist'}}>{g.proveedor}</div>
                      <div className="text-sm font-semibold flex-shrink-0" style={{color:C.navy,fontFamily:'"Fraunces",Georgia,serif',fontFeatureSettings:'"tnum"'}}>{fCRC(g.monto)}</div>

                    <div className="relative h-1.5 rounded-full overflow-hidden" style={{background:'#f1f5f9'}}>

                    </div>
                    <div className="flex gap-3 mt-1 text-xs" style={{color:C.mute}}><span>{g.mes}</span><span>·</span><span>{CATEGORY_LABELS[g.categoria]}</span></div>

                </div>

            {ejecucion.map(e=>(
              <div key={e.cat}>
                <div className="flex items-baseline justify-between mb-1.5">
                  <div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full" style={{background:ec[e.estado]}}/><span className="text-sm font-medium" style={{color:C.ink,fontFamily:'Geist'}}>{e.label}</span></div>
                  <div className="flex items-baseline gap-3">
                    <span className="text-xs" style={{color:C.mute}}>{fCRC(e.ej)} de {fCRC(e.pres)}</span>
                    <span className="font-semibold text-sm" style={{color:ec[e.estado],fontFamily:'"Fraunces",Georgia,serif'}}>{e.pct.toFixed(0)}%</span>

const TabVariaciones = ({data,metrics}) => {
  const meses = data.meses_disponibles;
  if(meses.length<2) return <Card><div className="text-center py-12"><div style={{fontSize:48}}>📊</div><h3 className="text-lg font-medium mt-4" style={{color:C.navy,fontFamily:'"Fraunces",Georgia,serif'}}>Se necesitan al menos dos meses</h3></div></Card>;
  const ult = meses[meses.length-1], ant = meses[meses.length-2];
  const vars = Object.keys(CATEGORY_LABELS).map(cat=>{
    const actual = data.gastos.filter(g=>g.mes===ult&&g.categoria===cat).reduce((s,g)=>s+g.monto,0);
    const anterior = data.gastos.filter(g=>g.mes===ant&&g.categoria===cat).reduce((s,g)=>s+g.monto,0);
    const pct = anterior>0?((actual-anterior)/anterior)*100:actual>0?100:0;
    return {cat,label:CATEGORY_LABELS[cat],actual,anterior,pct};
  }).filter(v=>v.actual>0||v.anterior>0);
  const comparacion = vars.map(v=>({cat:v.label,[ant]:v.anterior,[ult]:v.actual}));
  const evolucion = meses.map(mes=>{
    const item={mes};
    Object.keys(CATEGORY_LABELS).forEach(cat=>{item[CATEGORY_LABELS[cat]]=data.gastos.filter(g=>g.mes===mes&&g.categoria===cat).reduce((s,g)=>s+g.monto,0);});
    return item;
  });
  return (
    <div className="space-y-8">
      <div>
        <SectionTitle kicker="Mes a mes" subtitle={`${ant} vs ${ult} 2025`}>Variaciones por categoría</SectionTitle>
        <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-3">
          {vars.map(v=>{
            const subio=v.pct>0, sig=Math.abs(v.pct)>=20;
            return (
              <Card key={v.cat} padding="p-4">
                <div className="text-xs uppercase tracking-wide mb-1" style={{color:C.mute,fontFamily:'Geist'}}>{v.label}</div>
                <div className="flex items-baseline justify-between mb-1.5">
                  <div className="text-xl font-semibold" style={{color:C.navy,fontFamily:'"Fraunces",Georgia,serif'}}>{fShort(v.actual)}</div>
                  {v.pct!==0 && <div className="flex items-center gap-1 text-xs font-medium px-1.5 py-0.5 rounded" style={{color:subio?C.red:C.green,background:subio?'#fee2e2':'#dcfce7'}}>{subio?'↑':'↓'}{fPct(v.pct)}</div>}
                </div>
                <div className="text-xs" style={{color:C.mute}}>vs {fShort(v.anterior)} en {ant.toLowerCase()}</div>
                {sig && <div className="mt-2 pt-2 border-t text-xs" style={{borderColor:C.border,color:C.yellow}}>⚠ Variación significativa</div>}
              </Card>
            );
          })}
        </div>
      </div>
      <div className="grid lg:grid-cols-2 gap-6">
        <Card>
          <h3 className="font-medium mb-4" style={{fontFamily:'"Fraunces",Georgia,serif',fontSize:'1.15rem',color:C.navy}}>{ant} vs {ult}</h3>
          <ResponsiveContainer width="100%" height={300}>
            <BarChart data={comparacion} layout="vertical" margin={{left:20}}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border} horizontal={false}/>
              <XAxis type="number" tick={{fontSize:11,fill:C.mute}} tickFormatter={fShort}/>
              <YAxis dataKey="cat" type="category" tick={{fontSize:11,fill:C.mute}} width={110}/>
              <Tooltip formatter={(v)=>fCRC(v)} contentStyle={{background:'white',border:`1px solid ${C.border}`,borderRadius:8}}/>
              <Legend/>
              <Bar dataKey={ant} fill={C.navyLight} radius={[0,4,4,0]}/>
              <Bar dataKey={ult} fill={C.gold} radius={[0,4,4,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </Card>
        <Card>
          <h3 className="font-medium mb-4" style={{fontFamily:'"Fraunces",Georgia,serif',fontSize:'1.15rem',color:C.navy}}>Evolución mensual</h3>
          <ResponsiveContainer width="100%" height={300}>
            <LineChart data={evolucion}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="mes" tick={{fontSize:12,fill:C.mute}}/>
              <YAxis tick={{fontSize:11,fill:C.mute}} tickFormatter={fShort}/>
              <Tooltip formatter={(v)=>fCRC(v)} contentStyle={{background:'white',border:`1px solid ${C.border}`,borderRadius:8}}/>
              <Legend wrapperStyle={{fontSize:10}}/>
              {Object.keys(CATEGORY_LABELS).filter(cat=>metrics.porCategoria[cat]>0).map(cat=>(
                <Line key={cat} type="monotone" dataKey={CATEGORY_LABELS[cat]} stroke={CATEGORY_COLORS[cat]} strokeWidth={2} dot={{r:3}}/>
              ))}
            </LineChart>
          </ResponsiveContainer>
        </Card>
      </div>
    </div>
  );
};

    return {cat,label:CATEGORY_LABELS[cat],ej,p,pres,diff,estado};

const TabFacturas = ({data}) => {
  const [filtroMes,setFiltroMes]=useState('todos');
  const [filtroCat,setFiltroCat]=useState('todas');
  const [orden,setOrden]=useState('monto');
  let facturas=[...data.gastos];
  if(filtroMes!=='todos') facturas=facturas.filter(f=>f.mes===filtroMes);
  if(filtroCat!=='todas') facturas=facturas.filter(f=>f.categoria===filtroCat);
  if(orden==='monto') facturas.sort((a,b)=>b.monto-a.monto);
  else facturas.sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const total=facturas.reduce((s,f)=>s+f.monto,0);
  const conAlerta=new Set(['r10','r15','r23','p10']);
  const sel={borderColor:C.border,fontFamily:'Geist',color:C.ink,padding:'8px 12px',fontSize:'14px',borderRadius:'6px',border:`1px solid ${C.border}`};
  return (
    <div className="space-y-6">
      <SectionTitle kicker="Detalle" subtitle={`${facturas.length} facturas — ${fCRC(total)} total`}>Todas las facturas</SectionTitle>
      <Card padding="p-4">
        <div className="flex flex-wrap gap-3">
          <select value={filtroMes} onChange={e=>setFiltroMes(e.target.value)} style={sel}>
            <option value="todos">Todos los meses</option>
            {data.meses_disponibles.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
          <select value={filtroCat} onChange={e=>setFiltroCat(e.target.value)} style={sel}>
            <option value="todas">Todas las categorías</option>
            {Object.entries(CATEGORY_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select>
          <select value={orden} onChange={e=>setOrden(e.target.value)} style={sel}>
            <option value="monto">Por monto</option>
            <option value="fecha">Por fecha</option>
          </select>
        </div>
      </Card>
      <Card padding="p-0">
        <div className="overflow-x-auto">
          <table className="w-full">
            <thead><tr style={{background:'#f8fafc'}}>
              {['Fecha','Proveedor','Categoría','Descripción','Monto'].map(h=>(
                <th key={h} className="text-left px-5 py-3 text-xs uppercase tracking-wider font-medium" style={{color:C.mute,fontFamily:'Geist'}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {facturas.map(f=>(
                <tr key={f.id} style={{borderTop:`1px solid ${C.border}`,background:conAlerta.has(f.id)?'#fffbeb':'white'}}>
                  <td className="px-5 py-3 text-sm" style={{color:C.mute,fontFamily:'Geist'}}>{f.fecha}</td>
                  <td className="px-5 py-3 text-sm font-medium" style={{color:C.ink,fontFamily:'Geist'}}>
                    {conAlerta.has(f.id)?'⚠ ':''}{f.proveedor}
                  </td>
                  <td className="px-5 py-3 text-xs">
                    <span className="px-2 py-0.5 rounded text-xs font-medium" style={{color:CATEGORY_COLORS[f.categoria],background:`${CATEGORY_COLORS[f.categoria]}15`,fontFamily:'Geist'}}>{CATEGORY_LABELS[f.categoria]}</span>
                  </td>
                  <td className="px-5 py-3 text-sm" style={{color:C.mute,fontFamily:'Geist'}}>{f.descripcion}</td>
                  <td className="px-5 py-3 text-sm text-right font-semibold" style={{color:C.navy,fontFamily:'"Fraunces",Georgia,serif',fontFeatureSettings:'"tnum"'}}>{fCRC(f.monto)}</td>
                </tr>
              ))}
            </tbody>
            <tfoot><tr style={{background:C.navy,color:'white'}}>
              <td colSpan={4} className="px-5 py-3 text-sm font-semibold uppercase tracking-wider" style={{fontFamily:'Geist'}}>Total</td>
              <td className="px-5 py-3 text-right" style={{fontFamily:'"Fraunces",Georgia,serif',fontSize:'1.05rem',fontWeight:600,fontFeatureSettings:'"tnum"'}}>{fCRC(total)}</td>
            </tr></tfoot>
          </table>
        </div>
      </Card>
    </div>
  );
};

const TabChat = ({data,metrics}) => {
  const LIMITE=5;
  const [msgs,setMsgs]=useState([{role:'assistant',content:`Hola, soy el asistente de **${data.nombre}**. Preguntame lo que quieras sobre los gastos, presupuesto o fondo de reserva.`}]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const [uso,setUso]=useState(0);
  const ref=useRef(null);
  const sugeridas=[
    {key:'gasto_mas_alto',label:'¿Cuál fue el gasto más alto?'},
    {key:'salud_presupuesto',label:'¿Vamos bien con el presupuesto?'},
    {key:'fondo_reserva',label:'¿Cuánto dura el fondo de reserva?'},
    {key:'variaciones_inusuales',label:'¿Dónde hay variaciones inusuales?'},
    {key:'preguntas_asamblea',label:'¿Qué preguntar en asamblea?'},
  ];
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[msgs,loading]);
  const enviarSug=(key,label)=>setMsgs(p=>[...p,{role:'user',content:label},{role:'assistant',content:data.respuestas[key],pre:true}]);
  const enviar=async()=>{
    if(!input.trim()||loading||uso>=LIMITE) return;
    const q=input.trim(); setInput('');
    setMsgs(p=>[...p,{role:'user',content:q}]); setLoading(true);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:1024,
          system:`Sos un asistente financiero de CondoSmart para ${data.nombre}. Respondés en español costarricense, máximo 3 párrafos cortos. Nunca acusés a la administración. Datos: ${JSON.stringify({total_gastos:metrics.totalGastos,total_ingresos:metrics.totalIngresos,fondo:data.fondo_reserva_actual,morosos_count:data.morosos.length,monto_mora:data.morosos.reduce((s,m)=>s+m.monto,0),categorias:metrics.porCategoria})}`,
          messages:[{role:'user',content:q}]
        })
      });
      const d=await res.json();
      setMsgs(p=>[...p,{role:'assistant',content:d.content.filter(b=>b.type==='text').map(b=>b.text).join('\n')}]);
      setUso(u=>u+1);
    }catch{
      setMsgs(p=>[...p,{role:'assistant',content:'Disculpá, hubo un error. Probá con las preguntas sugeridas.',err:true}]);
    }finally{setLoading(false);}
  };
  const fmt=(t)=>t.split('\n').map((l,i)=>{
    const parts=l.split(/(\*\*[^*]+\*\*)/g).map((p,j)=>p.startsWith('**')&&p.endsWith('**')?<strong key={j} style={{color:C.navy}}>{p.slice(2,-2)}</strong>:p);
    return <div key={i} className={i>0?'mt-1':''}>{parts}</div>;
  });
  return (
    <div className="grid lg:grid-cols-3 gap-6">
      <div className="lg:col-span-2">
        <Card padding="p-0" className="overflow-hidden">
          <div className="px-6 py-4 flex items-center gap-3" style={{background:`linear-gradient(135deg,${C.navy},${C.navyLight})`,color:'white'}}>
            <div className="w-10 h-10 rounded-full flex items-center justify-center" style={{background:`${C.gold}30`,border:`1px solid ${C.gold}`,fontSize:'18px'}}>✨</div>
            <div>
              <div className="font-medium" style={{fontFamily:'"Fraunces",Georgia,serif'}}>Asistente CondoSmart</div>
              <div className="text-xs opacity-80">Sugeridas: gratis · Personalizadas: {uso}/{LIMITE} hoy</div>
            </div>
          </div>
          <div ref={ref} className="h-96 overflow-y-auto px-6 py-4 space-y-4" style={{background:'#fafafa'}}>
            {msgs.map((m,i)=>(
              <div key={i} className={`flex ${m.role==='user'?'justify-end':'justify-start'}`}>
                <div className="max-w-[85%] px-4 py-3 rounded-2xl text-sm leading-relaxed" style={{background:m.role==='user'?C.navy:'white',color:m.role==='user'?'white':C.ink,border:m.role==='assistant'?`1px solid ${C.border}`:'none',borderBottomRightRadius:m.role==='user'?4:16,borderBottomLeftRadius:m.role==='assistant'?4:16}}>
                  {fmt(m.content)}
                  {m.pre&&<div className="text-xs mt-2 opacity-50 italic">Respuesta precalculada</div>}
                </div>
              </div>
            ))}
            {loading&&<div className="flex justify-start"><div className="px-4 py-3 rounded-2xl" style={{background:'white',border:`1px solid ${C.border}`}}><div className="flex gap-1">{[0,1,2].map(i=><div key={i} className="w-2 h-2 rounded-full pulse" style={{background:C.navy}}/>)}</div></div></div>}
          </div>
          <div className="px-4 py-3 border-t flex gap-2" style={{borderColor:C.border,background:'white'}}>
            <input type="text" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&enviar()} placeholder={uso>=LIMITE?'Límite alcanzado...':'Escribí tu pregunta...'} disabled={loading||uso>=LIMITE} className="flex-1 px-4 py-2 text-sm rounded-lg border focus:outline-none disabled:opacity-50" style={{borderColor:C.border,fontFamily:'Geist'}}/>
            <button onClick={enviar} disabled={!input.trim()||loading||uso>=LIMITE} className="px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 disabled:opacity-40" style={{background:C.navy,color:'white',fontFamily:'Geist'}}>
              ➤ Enviar
            </button>
          </div>
        </Card>
      </div>
      <div>
        <Card>
          <h3 className="font-medium mb-1" style={{fontFamily:'"Fraunces",Georgia,serif',fontSize:'1.05rem',color:C.navy}}>Preguntas sugeridas</h3>
          <p className="text-xs mb-4" style={{color:C.mute}}>Respuestas instantáneas, sin costo</p>
          <div className="space-y-2">
            {sugeridas.map(p=>(
              <button key={p.key} onClick={()=>enviarSug(p.key,p.label)} className="w-full text-left px-3 py-2.5 text-sm rounded-lg border hover:bg-gray-50 transition" style={{borderColor:C.border,color:C.ink,fontFamily:'Geist'}}>
                ✨ {p.label}
              </button>
            ))}
          </div>
          <div className="mt-5 pt-5 border-t text-xs" style={{borderColor:C.border,color:C.mute}}>
            ℹ El asistente nunca acusa a nadie. Siempre sugiere qué preguntas valen la pena para la asamblea.
          </div>
        </Card>
      </div>
    </div>
  );
};

const TabValoracion = () => {
  const [form,setForm]=useState({valorDeclarado:'',m2C:'',m2T:'',anio:2018,provincia:'San José',acabados:'medio',parqueos:1,amenidades:['piscina'],conservacion:'bueno'});
  const [res,setRes]=useState(null);
  const calc=()=>{
    const m2C=parseFloat(form.m2C)||0, m2T=parseFloat(form.m2T)||0;
    if(!m2C||!m2T) return;
    const tarifas={'San José':250000,'Heredia':220000,'Cartago':180000,'Alajuela':160000,'Puntarenas':120000,'Guanacaste':280000,'Limón':100000};
    const costos={lujo:950000,medio:650000,basico:400000};
    const valT=m2T*tarifas[form.provincia];
    const valCB=m2C*costos[form.acabados];
    const dep=Math.min((2025-form.anio)*0.015,0.45);
    const valC=valCB*(1-dep);
    const ajP=form.parqueos*4500000, ajA=form.amenidades.length*2500000;
    const ajCons={excelente:1.05,bueno:1.0,regular:0.92,malo:0.82}[form.conservacion];
    const base=(valT+valC+ajP+ajA)*ajCons;
    const valD=parseFloat(form.valorDeclarado)||0;
    setRes({base,min:base*0.92,max:base*1.08,valT,valC,valCB,dep:dep*100,ajP,ajA,fiscal:base*0.85,diff:valD>0?((base*0.85-valD)/valD)*100:0,valD});
  };
  const inp={width:'100%',padding:'8px 12px',fontSize:'14px',borderRadius:'6px',border:`1px solid ${C.border}`,fontFamily:'Geist'};
  return (
    <div className="grid lg:grid-cols-2 gap-6">
      <Card>
        <SectionTitle kicker="Calculadora" subtitle="Valor referencial para la Declaración D-15">Valoración de propiedad</SectionTitle>
        <div className="space-y-4">
          <div className="grid grid-cols-2 gap-3">
            <div><label className="text-xs uppercase font-medium block mb-1" style={{color:C.mute,fontFamily:'Geist'}}>Valor declarado</label><input type="number" value={form.valorDeclarado} onChange={e=>setForm({...form,valorDeclarado:e.target.value})} placeholder="₡" style={inp}/></div>
            <div><label className="text-xs uppercase font-medium block mb-1" style={{color:C.mute,fontFamily:'Geist'}}>Año construcción</label><input type="number" value={form.anio} onChange={e=>setForm({...form,anio:parseInt(e.target.value)||2018})} style={inp}/></div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div><label className="text-xs uppercase font-medium block mb-1" style={{color:C.mute,fontFamily:'Geist'}}>m² construcción</label><input type="number" value={form.m2C} onChange={e=>setForm({...form,m2C:e.target.value})} placeholder="120" style={inp}/></div>
            <div><label className="text-xs uppercase font-medium block mb-1" style={{color:C.mute,fontFamily:'Geist'}}>m² terreno</label><input type="number" value={form.m2T} onChange={e=>setForm({...form,m2T:e.target.value})} placeholder="200" style={inp}/></div>
          </div>
          <div><label className="text-xs uppercase font-medium block mb-1" style={{color:C.mute}}>Provincia</label>
            <select value={form.provincia} onChange={e=>setForm({...form,provincia:e.target.value})} style={inp}>
              {['San José','Heredia','Cartago','Alajuela','Puntarenas','Guanacaste','Limón'].map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div><label className="text-xs uppercase font-medium block mb-1" style={{color:C.mute}}>Acabados</label>
              <select value={form.acabados} onChange={e=>setForm({...form,acabados:e.target.value})} style={inp}><option value="basico">Básicos</option><option value="medio">Medios</option><option value="lujo">De lujo</option></select>
            </div>
            <div><label className="text-xs uppercase font-medium block mb-1" style={{color:C.mute}}>Conservación</label>
              <select value={form.conservacion} onChange={e=>setForm({...form,conservacion:e.target.value})} style={inp}><option value="excelente">Excelente</option><option value="bueno">Bueno</option><option value="regular">Regular</option><option value="malo">Malo</option></select>
            </div>
          </div>
          <div><label className="text-xs uppercase font-medium block mb-1" style={{color:C.mute}}>Parqueos: {form.parqueos}</label><input type="range" min="0" max="3" value={form.parqueos} onChange={e=>setForm({...form,parqueos:parseInt(e.target.value)})} style={{width:'100%'}}/></div>
          <div>
            <label className="text-xs uppercase font-medium block mb-2" style={{color:C.mute}}>Amenidades</label>
            <div className="flex flex-wrap gap-2">
              {['piscina','gimnasio','rancho','cancha','área de juegos'].map(a=>{
                const act=form.amenidades.includes(a);
                return <button key={a} onClick={()=>setForm({...form,amenidades:act?form.amenidades.filter(x=>x!==a):[...form.amenidades,a]})} style={{padding:'4px 12px',fontSize:'12px',borderRadius:'20px',border:`1px solid ${act?C.gold:C.border}`,background:act?`${C.gold}15`:'white',color:act?C.goldDark:C.mute,cursor:'pointer'}}>{a}</button>;
              })}
            </div>
          </div>
          <button onClick={calc} disabled={!form.m2C||!form.m2T} style={{width:'100%',padding:'12px',borderRadius:'8px',background:C.navy,color:'white',fontFamily:'Geist',fontWeight:600,fontSize:'14px',border:'none',cursor:'pointer',opacity:(!form.m2C||!form.m2T)?0.4:1}}>
            🧮 Calcular valoración
          </button>
        </div>
      </Card>
      <div>
        {res?(
          <Card accent>
            <SectionTitle kicker="Resultado" subtitle="Valor estimado de mercado">Valoración referencial</SectionTitle>
            <div className="p-5 rounded-lg mb-5" style={{background:`linear-gradient(135deg,${C.cream},${C.paper})`,border:`1px solid ${C.border}`}}>
              <div className="text-xs uppercase tracking-widest mb-2 font-medium" style={{color:C.gold,fontFamily:'Geist'}}>Rango estimado</div>
              <div className="text-3xl font-medium" style={{fontFamily:'"Fraunces",Georgia,serif',color:C.navy,fontFeatureSettings:'"tnum"'}}>{fCRC(res.min)} – {fCRC(res.max)}</div>
              <div className="text-xs mt-2" style={{color:C.mute}}>Punto medio: <span style={{fontFamily:'"Fraunces"',fontWeight:600,color:C.ink}}>{fCRC(res.base)}</span></div>
            </div>
            {[['Valor del terreno',fCRC(res.valT)],['Construcción sin depreciar',fCRC(res.valCB)],[`Depreciación (${res.dep.toFixed(0)}%)`,`−${fCRC(res.valCB-res.valC)}`],['Construcción depreciada',fCRC(res.valC)],['Parqueos / amenidades',fCRC(res.ajP+res.ajA)]].map(([k,v])=>(
              <div key={k} className="flex justify-between text-sm mb-3"><span style={{color:C.mute,fontFamily:'Geist'}}>{k}</span><span style={{color:C.ink,fontFamily:'"Fraunces"',fontFeatureSettings:'"tnum"'}}>{v}</span></div>
            ))}
            <div className="p-4 rounded-lg mb-4 mt-4" style={{background:'#f0fdf4',border:`1px solid ${C.green}30`}}>
              <div className="text-xs uppercase font-medium mb-1" style={{color:C.green,fontFamily:'Geist'}}>Valor fiscal recomendado D-15</div>
              <div className="text-2xl font-medium" style={{fontFamily:'"Fraunces",Georgia,serif',color:C.navy,fontFeatureSettings:'"tnum"'}}>{fCRC(res.fiscal)}</div>
            </div>
            <div className="p-3 rounded text-xs flex gap-2" style={{background:'#f8fafc',color:C.mute,fontFamily:'Geist'}}>
              <span style={{color:C.gold}}>ℹ</span>
              <p><strong style={{color:C.navy}}>Valor referencial.</strong> El valor oficial lo determina la municipalidad con base en el mapa de valores del Ministerio de Hacienda.</p>
            </div>
          </Card>
        ):(
          <Card><div className="text-center py-12"><div style={{fontSize:48}}>🏠</div><h3 className="text-lg font-medium mt-4 mb-2" style={{color:C.navy,fontFamily:'"Fraunces",Georgia,serif'}}>Completá el formulario</h3><p className="text-sm" style={{color:C.mute}}>Llená m² de construcción y terreno para obtener la valoración.</p></div></Card>
        )}
      </div>
    </div>
  );
};

const TABS=[
  {id:'resumen',label:'Resumen',icon:'📊'},
  {id:'gastos',label:'Gastos',icon:'💸'},
  {id:'variaciones',label:'Variaciones',icon:'📈'},
  {id:'proyeccion',label:'Proyección',icon:'🔮'},
  {id:'facturas',label:'Facturas',icon:'🧾'},
  {id:'chat',label:'Consultar IA',icon:'💬'},
  {id:'valoracion',label:'Valoración',icon:'🏠'},
];

function App() {
  const [condoId,setCondoId]=useState('los-robles');
  const [tab,setTab]=useState('resumen');
  const [updating,setUpdating]=useState(false);
  const data=CONDOS[condoId];
  const metrics=useMemo(()=>calcMetrics(data),[data]);
  const actualizar=()=>{setUpdating(true);setTimeout(()=>setUpdating(false),1500);};
  const renderTab=()=>{
    switch(tab){
      case 'resumen': return <TabResumen data={data} metrics={metrics}/>;
      case 'gastos': return <TabGastos data={data} metrics={metrics}/>;
      case 'variaciones': return <TabVariaciones data={data} metrics={metrics}/>;
      case 'proyeccion': return <TabProyeccion data={data} metrics={metrics}/>;
      case 'facturas': return <TabFacturas data={data} metrics={metrics}/>;
      case 'chat': return <TabChat data={data} metrics={metrics}/>;
      case 'valoracion': return <TabValoracion/>;
      default: return null;
    }
  };
  return (
    <div style={{background:C.bg,minHeight:'100vh'}}>
      <header style={{background:`linear-gradient(135deg,${C.navyDeeper},${C.navy})`,color:'white'}}>
        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between flex-wrap gap-4">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-lg flex items-center justify-center" style={{background:`${C.gold}20`,border:`1px solid ${C.gold}`,fontSize:'20px'}}>🏢</div>
            <div>
              <div style={{fontFamily:'"Fraunces",Georgia,serif',fontSize:'1.4rem',fontWeight:500,letterSpacing:'-0.02em',fontStyle:'italic'}}>CondoSmart</div>
              <div className="text-xs opacity-70">Transparencia financiera para condominios</div>
            </div>
          </div>
          <div className="flex items-center gap-3 flex-wrap">
            <select value={condoId} onChange={e=>setCondoId(e.target.value)} style={{background:'rgba(255,255,255,0.1)',color:'white',border:'1px solid rgba(255,255,255,0.2)',padding:'8px 16px',borderRadius:'8px',fontSize:'14px',fontWeight:500,fontFamily:'Geist'}}>
              {Object.values(CONDOS).map(c=><option key={c.id} value={c.id} style={{color:C.ink}}>{c.nombre} · {c.unidades} unidades</option>)}
            </select>
            <button onClick={actualizar} disabled={updating} style={{background:C.gold,color:C.navy,padding:'8px 16px',borderRadius:'8px',fontSize:'14px',fontWeight:600,fontFamily:'Geist',border:'none',cursor:'pointer',opacity:updating?0.7:1,display:'flex',alignItems:'center',gap:'8px'}}>
              <span className={updating?'spin':''}style={{display:'inline-block'}}>↻</span>
              {updating?'Sincronizando…':'Actualizar datos'}
            </button>
          </div>
        </div>
        <div className="border-t" style={{borderColor:'rgba(255,255,255,0.1)'}}>
          <div className="max-w-7xl mx-auto px-6 flex overflow-x-auto">
            {TABS.map(t=>{
              const active=t.id===tab;
              return (
                <button key={t.id} onClick={()=>setTab(t.id)} style={{color:active?C.goldLight:'rgba(255,255,255,0.7)',borderBottom:`2px solid ${active?C.gold:'transparent'}`,padding:'12px 16px',fontSize:'14px',whiteSpace:'nowrap',background:'none',border:'none',borderBottom:`2px solid ${active?C.gold:'transparent'}`,cursor:'pointer',fontWeight:active?600:400,fontFamily:'Geist'}}>
                  {t.icon} {t.label}
                </button>
              );
            })}
          </div>
        </div>
      </header>
      <div className="border-b" style={{background:'white',borderColor:C.border}}>
        <div className="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between flex-wrap gap-2">
          <div className="flex items-center gap-4 text-xs" style={{color:C.mute,fontFamily:'Geist'}}>
            <span>🏢</span><span style={{color:C.ink,fontWeight:500}}>{data.nombre}</span>
            <span>·</span><span>{data.unidades} unidades</span>
            <span>·</span><span>Cuota {fCRC(data.cuota)}</span>
            <span>·</span><span>{data.meses_disponibles.length} meses cargados</span>
          </div>
          <div className="text-xs" style={{color:C.mute,fontFamily:'Geist'}}>🔒 Datos seguros en Google Drive</div>
        </div>
      </div>
      <main className="max-w-7xl mx-auto px-6 py-8">{renderTab()}</main>
      <footer className="max-w-7xl mx-auto px-6 py-8 mt-8 border-t" style={{borderColor:C.border}}>
        <div className="flex items-center justify-between flex-wrap gap-3 text-xs" style={{color:C.mute,fontFamily:'Geist'}}>
          <div><strong style={{color:C.navy,fontFamily:'"Fraunces"',fontStyle:'italic'}}>CondoSmart</strong> · Transparencia financiera para condominios en Costa Rica</div>
          <div>Sin login · Sin instalaciones · Datos en Google Drive</div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
